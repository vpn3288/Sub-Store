# fly.toml - Fly.io 配置文件
app = "sub-store-xzy"
primary_region = "sin"

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = "production"
  SUB_STORE_DATA_BASE_PATH = "/data"
  SUB_STORE_BACKEND_API_PORT = "8080"
  SUB_STORE_BACKEND_API_HOST = "::"
  SUB_STORE_BACKEND_MERGE = "true"
  SUB_STORE_FRONTEND_PATH = "/opt/app/frontend"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256

[mounts]
  source = "sub_store_data"
  destination = "/data"
